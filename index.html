<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Larkollen – Dag En</title>
    <style>
      body { margin: 0; background: #000; overflow: hidden; }
      #root { width: 100vw; height: 100vh; }
      /* Lasteskjerm – skjules av React når appen er klar */
      #loading-overlay {
        position: fixed;
        inset: 0;
        background: linear-gradient(180deg, #0a0a0a 0%, #1a0505 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: monospace;
        color: #fff;
        z-index: 9999;
        transition: opacity 0.5s;
      }
      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #loading-overlay h1 {
        font-size: 36px;
        margin: 0;
        color: #e63946;
        text-shadow: 0 0 30px rgba(230,57,70,0.4);
      }
      #loading-overlay p {
        margin-top: 24px;
        font-size: 16px;
        color: #888;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay">
      <h1>LARKOLLEN</h1>
      <p>Laster...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Fjern loading-overlay når React har montert
      window.addEventListener('DOMContentLoaded', () => {
        const check = setInterval(() => {
          if (document.getElementById('root')?.children.length > 0) {
            const overlay = document.getElementById('loading-overlay')
            if (overlay) {
              overlay.classList.add('hidden')
              setTimeout(() => overlay.remove(), 600)
            }
            clearInterval(check)
          }
        }, 100)
      })
    </script>
  </body>
</html>
